name: mulda-c-cross-compile

on:
  push:
    branches: ["main"]
    paths:
      - "projects/hantec-lang/**"
      - ".github/workflows/mulda-c-cross.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "projects/hantec-lang/**"
      - ".github/workflows/mulda-c-cross.yml"

jobs:
  build-mulda-c:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/hantec-lang
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install mingw-w64 and gcc
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential mingw-w64

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Cross build Linux + Windows from one source
        run: npm run build:c:cross -- examples/hello.mulda

      - name: Build RC bundle
        run: npm run release:rc

      - name: Verify release checksums (fail-fast)
        run: sha256sum -c release/checksums.sha256

      - name: Upload C artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mulda-c-artifacts
          path: |
            projects/hantec-lang/dist/hello.c
            projects/hantec-lang/dist/hello-linux-x64
            projects/hantec-lang/dist/hello-linux-x64.metadata.json
            projects/hantec-lang/dist/hello-windows-x64.exe
            projects/hantec-lang/dist/hello-windows-x64.exe.metadata.json
            projects/hantec-lang/dist/hello.release-manifest.json
            projects/hantec-lang/release/checksums.sha256
            projects/hantec-lang/release/manifest.json
            projects/hantec-lang/release/manifest.source.json
            projects/hantec-lang/release/linux/bin/mulda
            projects/hantec-lang/release/windows/bin/mulda.exe
          if-no-files-found: error
