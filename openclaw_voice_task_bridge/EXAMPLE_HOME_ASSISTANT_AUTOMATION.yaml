# EXAMPLE_HOME_ASSISTANT_AUTOMATION v2
# Cíl: poslat text z HA do add-onu, který ho předá do OpenClaw Gateway (agent inbound)

rest_command:
  openclaw_task_v2:
    url: "http://a0d7b954-openclaw_voice_task_bridge:8099/task"
    method: POST
    headers:
      Content-Type: application/json
      X-HA-Token: "YOUR_SHARED_TOKEN_IF_USED"
    payload: '{"text": "{{ text }}"}'

automation:
  - alias: "Pošli hlasový úkol do OpenClaw (v2 gateway)"
    mode: single
    triggers:
      - trigger: state
        entity_id: input_text.openclaw_task_text
    conditions:
      - condition: template
        value_template: "{{ states('input_text.openclaw_task_text') | trim != '' }}"
    actions:
      - action: rest_command.openclaw_task_v2
        data:
          text: "{{ states('input_text.openclaw_task_text') }}"
