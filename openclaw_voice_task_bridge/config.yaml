name: "OpenClaw Voice Task Bridge"
slug: "openclaw_voice_task_bridge"
version: "0.3.0"
description: "Forward voice tasks from Home Assistant directly to OpenClaw Gateway RPC (with optional Telegram fallback)"
url: "https://github.com/filip/vector-forge"
arch:
  - aarch64
  - amd64
  - armv7
  - i386
startup: application
boot: auto
init: false
panel_icon: mdi:robot
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "HTTP endpoint for /task and /health"
options:
  mode: gateway_rpc
  gateway_url: "http://host.docker.internal:18789"
  gateway_token: ""
  gateway_method: "openresponses"
  gateway_target: "telegram:5873857816"
  agent_id: "main"
  session_key: ""
  account_id: "default"
  channel: "telegram"
  debug_logging: true
  telegram_forward: false
  telegram_bot_token: ""
  telegram_chat_id: ""
  ha_shared_token: ""
  listen_port: 8099
  http_timeout_seconds: 20
  dispatch_retries: 2
  retry_backoff_seconds: 1
  # Deprecated compatibility keys (still accepted):
  openclaw_base_url: ""
  openclaw_token: ""
  openclaw_to: ""
  openclaw_channel: ""
  openclaw_account_id: ""
schema:
  mode: list(gateway_rpc|telegram|gateway)
  gateway_url: str
  gateway_token: str?
  gateway_method: list(openresponses|chat_completions|tools_invoke_message)
  gateway_target: str?
  agent_id: str?
  session_key: str?
  account_id: str?
  channel: str?
  debug_logging: bool?
  telegram_forward: bool?
  telegram_bot_token: str?
  telegram_chat_id: str?
  ha_shared_token: str?
  listen_port: port
  http_timeout_seconds: int?
  dispatch_retries: int?
  retry_backoff_seconds: int?
  # Deprecated compatibility keys:
  openclaw_base_url: str?
  openclaw_token: str?
  openclaw_to: str?
  openclaw_channel: str?
  openclaw_account_id: str?
