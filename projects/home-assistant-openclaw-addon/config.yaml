name: "OpenClaw Voice Task Bridge"
slug: "openclaw_voice_task_bridge_dev"
version: "0.1.0-dev"
description: "Forward voice tasks from Home Assistant automation to OpenClaw via Telegram"
url: "https://github.com/filip/vector-forge"
arch:
  - aarch64
  - amd64
  - armv7
  - i386
startup: application
boot: auto
init: false
panel_icon: mdi:robot
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "HTTP endpoint for /task and /health"
options:
  telegram_bot_token: ""
  telegram_chat_id: ""
  ha_shared_token: ""
  listen_port: 8099
schema:
  telegram_bot_token: str
  telegram_chat_id: str
  ha_shared_token: str?
  listen_port: port
