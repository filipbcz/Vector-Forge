# Příklad konfigurace Home Assistantu
# 1) Přidejte do configuration.yaml část rest_command
# 2) V automatizaci pak zavolejte rest_command.openclaw_task

rest_command:
  openclaw_task:
    url: "http://a0d7b954-openclaw_voice_task_bridge:8099/task"
    method: POST
    headers:
      Content-Type: application/json
      X-HA-Token: "YOUR_SHARED_TOKEN_IF_USED"
    payload: '{"text": "{{ text }}"}'

automation:
  - alias: "Pošli hlasový úkol do OpenClaw"
    mode: single
    triggers:
      - trigger: state
        entity_id: input_text.openclaw_task_text
    conditions:
      - condition: template
        value_template: "{{ states('input_text.openclaw_task_text') | trim != '' }}"
    actions:
      - action: rest_command.openclaw_task
        data:
          text: "{{ states('input_text.openclaw_task_text') }}"
