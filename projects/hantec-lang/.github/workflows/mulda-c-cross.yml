name: mulda-c-cross

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rc-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential mingw-w64

      - name: Install dependencies
        run: npm ci

      - name: Unit/integration tests
        run: npm test

      - name: Installer smoke + static validation
        run: npm run check:installers

      - name: Cross build
        run: npm run build:c:cross -- examples/hello.mulda

      - name: RC release build
        run: npm run release:rc

      - name: Reproducibility audit (successive bundles)
        run: npm run audit:reproducibility
