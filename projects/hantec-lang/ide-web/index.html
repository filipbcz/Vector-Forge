<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hantec IDE v0.1</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background:#111; color:#eee; }
    .wrap { display:grid; grid-template-columns: 1fr 1fr; height:100vh; }
    textarea, pre { width:100%; height:100%; box-sizing:border-box; border:0; padding:16px; }
    textarea { background:#1a1a1a; color:#b8f; resize:none; }
    .right { display:flex; flex-direction:column; }
    button { padding:10px 14px; margin:10px; width:120px; }
    pre { margin:0; background:#090909; color:#9f9; overflow:auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <textarea id="src"># Hantec v0.1 demo
rekni Nazdar z Hantecu!
spocitej 21 + 21</textarea>
    <div class="right">
      <button id="runBtn">Run</button>
      <pre id="out">Klikni Run...</pre>
    </div>
  </div>
  <script>
    const runBtn = document.getElementById('runBtn');
    const src = document.getElementById('src');
    const out = document.getElementById('out');

    runBtn.addEventListener('click', async () => {
      out.textContent = 'Running...';
      const res = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ source: src.value })
      });
      const data = await res.json();
      out.textContent = data.output ?? data.error;
    });
  </script>
</body>
</html>
