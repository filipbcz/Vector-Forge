checks:
  gateway_command: "openclaw gateway status"
  gateway_health_url: ""
  gateway_timeout_sec: 25

  channels_command: "openclaw channels status"
  channels_timeout_sec: 25

  log_file_glob: "/tmp/openclaw/openclaw-*.log"
  log_tail_lines: 300

log_ignore_patterns:
  - "web_fetch.*403.*cloudflare"
  - "external_untrusted_content"

thresholds:
  warning_error_lines: 1
  critical_error_lines: 5

notify:
  enabled: false
  telegram_bot_token: ""
  telegram_chat_id: ""
  notify_min_severity: "warning"
  cooldown_seconds_warning: 600
  cooldown_seconds_critical: 300

paths:
  output_json: "out/latest.json"
